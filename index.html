<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Hangman Game</title>
        <link rel="stylesheet" href="style.css">
        <script src="word_List.js" defer></script>
        <script src="main.js" defer></script>
</head>
<body>

    <div class="intro_game">
        <div class="intro_content">
            <h1>Hangman Game</h1>
            <p>Are you ready to test your vocabulary 😉</p>
                <button class="play_game">Start Game</button>
        </div>
    </div>
    
    <div class="game-modal">
        <div class="content">
            <img src="images/lost.gif" alt="gif">
            <h4>Game Over</h4>
            <p>The Correct Word Was <b>Rainbow</b></p>
            <button class="play-again">Play Again</button>
        </div>
    </div>

    <div class="container">
        <h4 class="level">level: <b></b></h4>
        <div class="hangman-box">
            <img src="images/hangman-0.svg" alt="hangman-0">
            <h1>Hangman Game</h1>
        </div>

        <div class="game-box">
            <ul class="word-display"></ul>

            <h4 class="hint-text">
                Hint:    
                <b></b>
            </h4>
            <h4 class="guesses-text">
                Incorrect guesses:    
                <b>0 / 6</b>
            </h4>
            
            <div class="keyboard"></div>
        </div>
    </div>

</body>
</html>
